<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
  .container { max-width: 560px; margin: 30px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .header { background: #212529; color: #fff; padding: 24px 32px; }
  .header h2 { margin: 0; font-size: 20px; }
  .header p { margin: 4px 0 0; font-size: 13px; color: #adb5bd; }
  .body { padding: 32px; color: #333; line-height: 1.6; }
  .info-box { background: #f8f9fa; border-left: 4px solid #212529; padding: 16px 20px; border-radius: 4px; margin: 20px 0; }
  .info-box p { margin: 6px 0; font-size: 14px; }
  .info-box strong { display: inline-block; min-width: 160px; color: #555; }
  .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; }
  .badge-success { background: #d1e7dd; color: #0a5e38; }
  .badge-danger  { background: #f8d7da; color: #842029; }
  .footer { background: #f8f9fa; padding: 16px 32px; font-size: 12px; color: #999; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>🚗 InOut Veículos</h2>
    <p>Sistema de controle de entrada e saída</p>
  </div>
  <div class="body">
    {% block content %}{% endblock %}
  </div>
  <div class="footer">
    Esta é uma mensagem automática. Não responda a este e-mail.
  </div>
</div>
</body>
</html>
